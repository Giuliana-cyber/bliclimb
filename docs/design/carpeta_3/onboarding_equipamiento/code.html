<body class="bg-surface text-on-surface min-h-screen font-body-md flex flex-col">
<!-- Header: Onboarding TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface px-margin-mobile h-touch-target flex items-center justify-between">
<button class="text-outline hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-90 transition-transform">

</div>
</div>
<button class="text-outline hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-90 transition-transform">

<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile py-8 flex flex-col gap-8">

</div>
<div class="relative bg-surface-container-highest text-on-surface-variant p-4 rounded-t-2xl rounded-br-2xl bubble-tail custom-shadow max-w-[240px]" style="transform: translateY(-2.94711px);">
<p class="font-body-md text-body-md leading-relaxed">
                        Última: tu equipo. Cuéntame qué tienes a la mano para ajustar tus ejercicios.

<button class="px-5 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-label-lg transition-all active:scale-95 flex items-center gap-2 hover:bg-surface-container-low" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[18px]">fitness_center</span>

<button class="px-5 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-label-lg transition-all active:scale-95 flex items-center gap-2 hover:bg-surface-container-low" onclick="toggleChip(this)">
<span class="material-symbols-outlined text-[18px]">rebase</span>

                </button>
<button class="px-5 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-label-lg transition-all active:scale-95 flex items-center gap-2 hover:bg-surface-container-low" onclick="toggleChip(this)">

            </p>

<script>
        function toggleChip(element) {
            element.classList.toggle('chip-selected');
            const icon = element.querySelector('.material-symbols-outlined');
            if (element.classList.contains('chip-selected')) {
                icon.style.fontVariationSettings = "'FILL' 1";
            } else {
                icon.style.fontVariationSettings = "'FILL' 0";
            }
        }

        // Atmospheric micro-interaction: subtle floating for Bill's bubble
        const bubble = document.querySelector('.bubble-tail');
        if(bubble) {
            let angle = 0;
            function animate() {
                angle += 0.05;
                const yOffset = Math.sin(angle) * 3;
                bubble.style.transform = `translateY(${yOffset}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
