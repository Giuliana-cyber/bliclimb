</div>
<div class="bg-surface-container-low p-4 rounded-2xl rounded-tl-none shadow-sm relative border border-surface-container">
<p class="text-body-md text-on-surface">

<!-- Little triangle tail -->
<div class="absolute -left-2 top-0 w-4 h-4 bg-surface-container-low border-l border-t border-surface-container transform -skew-x-12 origin-top-right"></div>
</div>

<!-- Title -->
<div>
<h1 class="text-headline-lg-mobile font-headline font-bold text-primary mb-2 leading-tight">

<p class="text-body-md text-on-surface-variant">

            </p>
</div>
<!-- Form Elements -->
<div class="flex flex-col gap-8">
<!-- Boulder/Ruta Toggle -->
<div class="bg-surface-container p-1 rounded-full flex w-full relative shadow-inner">
<div class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-primary rounded-full shadow-sm transition-transform duration-300 ease-in-out" id="toggle-bg"></div>
<button class="flex-1 relative z-10 py-3 text-label-lg font-bold rounded-full transition-colors duration-300 text-on-primary" id="btn-boulder" type="button">
                    Boulder

<button class="flex-1 relative z-10 py-3 text-label-lg font-bold rounded-full transition-colors duration-300 text-on-surface-variant" id="btn-ruta" type="button">
                    Ruta
                </button>
</div>
<!-- Grade Selection (Boulder) -->
<div class="space-y-4" id="section-boulder">
<h3 class="text-label-lg font-bold text-on-surface uppercase tracking-wider text-sm">Tu nivel habitual</h3>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-semibold hover:border-primary hover:text-primary transition-colors focus:bg-primary-container focus:text-on-primary-container focus:border-primary-container" type="button">
                        V0 – V3

<button class="px-6 py-3 rounded-full border-2 border-primary bg-primary-container text-on-primary-container font-semibold transition-colors" type="button">
                        V4 – V6

<button class="px-6 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-semibold hover:border-primary hover:text-primary transition-colors focus:bg-primary-container focus:text-on-primary-container focus:border-primary-container" type="button">

<button class="px-6 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-semibold hover:border-primary hover:text-primary transition-colors focus:bg-primary-container focus:text-on-primary-container focus:border-primary-container" type="button">

<div class="flex flex-wrap gap-3">

<button class="px-6 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-semibold hover:border-primary hover:text-primary transition-colors" type="button">

<button class="px-6 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-semibold hover:border-primary hover:text-primary transition-colors" type="button">

<button class="px-6 py-3 rounded-full border-2 border-outline-variant text-on-surface-variant font-semibold hover:border-primary hover:text-primary transition-colors" type="button">

</div>

</main>
<!-- Fixed Bottom Action (No navigation shell for transactional screens) -->
<div class="fixed bottom-0 left-0 w-full bg-background px-margin-mobile py-4 border-t border-surface-variant z-50">
<div class="max-w-md mx-auto">
<button class="w-full h-button-height bg-[#D6463A] hover:bg-[#b13a30] text-on-secondary font-bold text-label-lg rounded-full flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-md">
                Siguiente
                <span class="material-symbols-outlined text-[20px] font-bold">arrow_forward</span>
</button>
</div>
</div>
<!-- Minimal JS for Toggle Interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnBoulder = document.getElementById('btn-boulder');
            const btnRuta = document.getElementById('btn-ruta');
            const toggleBg = document.getElementById('toggle-bg');
            const secBoulder = document.getElementById('section-boulder');
            const secRuta = document.getElementById('section-ruta');

            btnBoulder.addEventListener('click', () => {
                toggleBg.style.transform = 'translateX(0)';
                btnBoulder.classList.add('text-on-primary');
                btnBoulder.classList.remove('text-on-surface-variant');
                btnRuta.classList.remove('text-on-primary');
                btnRuta.classList.add('text-on-surface-variant');
                
                secBoulder.classList.remove('hidden');
                secRuta.classList.add('hidden');
            });

            btnRuta.addEventListener('click', () => {
                toggleBg.style.transform = 'translateX(100%)';
                btnRuta.classList.add('text-on-primary');
                btnRuta.classList.remove('text-on-surface-variant');
                btnBoulder.classList.remove('text-on-primary');
                btnBoulder.classList.add('text-on-surface-variant');
                
                secRuta.classList.remove('hidden');
                secBoulder.classList.add('hidden');
            });
            
            // Simple generic chip selection logic for visual feedback
            const chipGroups = document.querySelectorAll('.flex-wrap');
            chipGroups.forEach(group => {
                const buttons = group.querySelectorAll('button');
                buttons.forEach(btn => {
                    btn.addEventListener('click', function() {
                        // Deselect others in group
                        buttons.forEach(b => {
                            if(b.classList.contains('border-primary') && b.parentElement.id.includes('section')) {
                                b.classList.remove('border-primary', 'bg-primary-container', 'text-on-primary-container');
                                b.classList.add('border-outline-variant', 'text-on-surface-variant');
                            }
                            if(b.classList.contains('border-secondary')) {
                                b.classList.remove('border-secondary', 'bg-secondary-container', 'text-on-secondary-container');
                                b.classList.add('border-outline-variant', 'bg-surface-container-low', 'text-on-surface');
                            }
                        });
                        
                        // Select current
                        if (this.closest('#section-boulder') || this.closest('#section-ruta')) {
                            this.classList.remove('border-outline-variant', 'text-on-surface-variant');
                            this.classList.add('border-2', 'border-primary', 'bg-primary-container', 'text-on-primary-container');
                        } else {
                            this.classList.remove('border-outline-variant', 'bg-surface-container-low', 'text-on-surface');
                            this.classList.add('border-secondary', 'bg-secondary-container', 'text-on-secondary-container');
                        }
                    });
                });
            });
        });
    </script>
